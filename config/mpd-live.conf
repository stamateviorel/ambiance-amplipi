# ambiance-amplipi mpd.conf — LIVE variant (output = ch0 ALSA @ 44.1k). cutover-pi.sh copies
# this over mpd.conf once squeezelite-general/the old stack has released ch0.
playlist_directory  "/home/pi/ambiance-amplipi/run/playlists"
log_file            "/home/pi/ambiance-amplipi/run/mpd.log"
pid_file            "/home/pi/ambiance-amplipi/run/mpd.pid"
state_file          "/home/pi/ambiance-amplipi/run/mpd.state"

bind_to_address     "127.0.0.1"
port                "6600"
auto_update         "no"
restore_paused      "yes"
metadata_to_use     "artist,album,title,name"

audio_output {
    type        "alsa"
    name        "ch0-radio"
    device      "ch0"
    mixer_type  "none"
}
