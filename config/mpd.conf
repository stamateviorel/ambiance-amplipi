# ambiance-amplipi mpd.conf — PHASE 0 variant (output = null; proves streaming without
# touching the live ch0 path). CUTOVER: cutover-pi.sh copies mpd-live.conf over this.
playlist_directory  "/home/pi/ambiance-amplipi/run/playlists"
log_file            "/home/pi/ambiance-amplipi/run/mpd.log"
pid_file            "/home/pi/ambiance-amplipi/run/mpd.pid"
state_file          "/home/pi/ambiance-amplipi/run/mpd.state"

bind_to_address     "127.0.0.1"
port                "6600"
auto_update         "no"
restore_paused      "yes"
metadata_to_use     "artist,album,title,name"   # ICY StreamTitle -> title/name

audio_output {
    type    "null"
    name    "phase0-null"
}
