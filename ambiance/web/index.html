<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ambiance AmpliPi</title>
<style>
  :root { --bg:#0c0c10; --card:#16161c; --card2:#1e1e26; --line:#2a2a34; --txt:#e8e8ec;
          --dim:#9a9aa6; --accent:#4aa3ff; --ok:#3cd28a; --off:#6a6a76; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:16px; }
  h1 { font-size:16px; margin:4px 0 14px; color:var(--dim); font-weight:600; letter-spacing:.4px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:14px; }
  .now { display:flex; gap:14px; align-items:center; }
  .art { width:84px; height:84px; border-radius:10px; background:var(--card2); object-fit:cover; flex:0 0 auto; }
  .station { font-size:19px; font-weight:700; }
  .title { color:var(--dim); margin-top:3px; min-height:20px; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:var(--off); margin-right:7px; vertical-align:middle; }
  .dot.on { background:var(--ok); }
  .row { display:flex; gap:8px; align-items:center; }
  .transport { justify-content:center; margin-top:12px; gap:10px; }
  button { background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:10px;
           padding:10px 14px; font-size:16px; cursor:pointer; }
  button:active { background:#2a2a34; }
  button.primary { background:var(--accent); border-color:var(--accent); color:#04121f; font-weight:700; }
  select, input[type=range] { width:100%; }
  select { background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:10px; font-size:15px; }
  input[type=range] { accent-color:var(--accent); height:26px; }
  .lbl { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.5px; margin:14px 0 6px; }
  .zone { display:grid; grid-template-columns:1fr auto; gap:6px 10px; padding:10px 0; border-bottom:1px solid var(--line); align-items:center; }
  .zone:last-child { border-bottom:0; }
  .zname { font-weight:600; }
  .zctl { display:flex; gap:8px; align-items:center; }
  .pill { border:1px solid var(--line); border-radius:20px; padding:6px 12px; font-size:13px; background:var(--card2); }
  .pill.on { background:var(--ok); border-color:var(--ok); color:#04140c; font-weight:700; }
  .pill.muted { background:#c25; border-color:#c25; color:#fff; }
  .zvol { grid-column:1 / -1; }
  input[type=text] { width:100%; background:var(--card2); color:var(--txt); border:1px solid var(--line);
    border-radius:10px; padding:9px 10px; font-size:14px; margin-top:6px; }
  .sthead { cursor:pointer; }
  .strow { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line); }
  .strow:last-child { border-bottom:0; }
  .foot { color:var(--off); font-size:12px; text-align:center; margin-top:8px; }
  .foot b.ok { color:var(--ok); } .foot b.bad { color:#e66; }
</style>
</head>
<body>
<div class="wrap">
  <h1>AMBIANCE AMPLIPI</h1>

  <div class="card">
    <div class="now">
      <img id="art" class="art" alt="">
      <div style="min-width:0">
        <div class="station"><span id="dot" class="dot"></span><span id="station">—</span></div>
        <div id="title" class="title"></div>
      </div>
    </div>
    <div class="row transport">
      <button onclick="post('/api/radio/prev')">⏮</button>
      <button id="playbtn" class="primary" onclick="togglePlay()">▶︎</button>
      <button onclick="post('/api/radio/next')">⏭</button>
    </div>
    <div class="lbl">Zender</div>
    <select id="stations" onchange="selectStation(this.value)"></select>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <span class="lbl" style="margin:0">Alle zones — volume</span>
      <button id="mmute" class="pill" onclick="toggleMasterMute()">Dempen</button>
    </div>
    <input type="range" min="0" max="100" id="mvol" oninput="mv(this.value)" onchange="mvCommit(this.value)">
  </div>

  <div class="card" id="groupscard" style="display:none">
    <div class="lbl" style="margin-top:0">Groepen</div>
    <div id="groups"></div>
  </div>

  <div class="card">
    <div class="lbl" style="margin-top:0">Zones</div>
    <div id="zones"></div>
  </div>

  <div class="card">
    <div class="row sthead" style="justify-content:space-between" onclick="toggleAdmin()">
      <span class="lbl" style="margin:0">Zenders beheren</span>
      <span id="admchev">▸</span>
    </div>
    <div id="admin" style="display:none">
      <div id="stationlist"></div>
      <div class="lbl">Nieuwe zender / bewerken</div>
      <input type="text" id="s_name" placeholder="Naam">
      <input type="text" id="s_url" placeholder="Stream-URL">
      <input type="text" id="s_logo" placeholder="Logo-URL (optioneel)">
      <div class="row" style="gap:8px; margin-top:10px">
        <button class="primary" id="savebtn" onclick="saveStation()">Toevoegen</button>
        <button onclick="clearForm()">Wissen</button>
      </div>
    </div>
  </div>

  <div class="foot">audio: <b id="health">…</b> · <span id="clock"></span></div>
</div>

<script>
let ST = null, dragging = false;
async function get(u){ const r = await fetch(u); return r.ok ? r.json() : null; }
async function post(u, body){ await fetch(u, {method:'POST', headers:{'Content-Type':'application/json'},
    body: body?JSON.stringify(body):null}); setTimeout(refresh, 250); }
async function patch(u, body){ await fetch(u, {method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)}); }

function togglePlay(){ post(ST && ST.radio.playing ? '/api/radio/stop' : '/api/radio/play'); }
function selectStation(name){ if(name) post('/api/radio', {station:name}); }

// ---- station management ----
let ADMIN = [], editingOrig = null;
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function vv(id){ return document.getElementById(id).value.trim(); }
function toggleAdmin(){ const a=document.getElementById('admin'); const open=a.style.display==='none';
  a.style.display=open?'block':'none'; document.getElementById('admchev').textContent=open?'▾':'▸'; if(open) loadStations(); }
async function loadStations(){
  const d = await get('/api/stations'); if(!d) return; ADMIN = d.stations;
  document.getElementById('stationlist').innerHTML = ADMIN.map((s,i)=>
    `<div class="strow"><div class="zname">${i===0?'★ ':''}${esc(s.name)}</div>
      <div class="zctl">
        <span class="pill" title="Als standaard" onclick="stDefault(${i})">★</span>
        <span class="pill" title="Bewerken" onclick="stEdit(${i})">✎</span>
        <span class="pill muted" title="Verwijderen" onclick="stDel(${i})">🗑</span>
      </div></div>`).join('');
}
async function saveStation(){
  const name=vv('s_name'), url=vv('s_url'), logo=vv('s_logo'); if(!name||!url) return;
  if(editingOrig!==null){ await patch('/api/stations', {orig:editingOrig, name, url, logo}); }
  else { await fetch('/api/stations', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,url,logo})}); }
  clearForm(); loadStations(); setTimeout(refresh, 300);
}
function stEdit(i){ const s=ADMIN[i]; document.getElementById('s_name').value=s.name;
  document.getElementById('s_url').value=s.url; document.getElementById('s_logo').value=s.logo||'';
  editingOrig=s.name; document.getElementById('savebtn').textContent='Opslaan'; }
function clearForm(){ ['s_name','s_url','s_logo'].forEach(id=>document.getElementById(id).value='');
  editingOrig=null; document.getElementById('savebtn').textContent='Toevoegen'; }
async function stDel(i){ if(!confirm('Verwijder "'+ADMIN[i].name+'"?')) return;
  await fetch('/api/stations/'+encodeURIComponent(ADMIN[i].name), {method:'DELETE'}); loadStations(); setTimeout(refresh,300); }
async function stDefault(i){ await fetch('/api/stations/'+encodeURIComponent(ADMIN[i].name)+'/default', {method:'POST'}); loadStations(); setTimeout(refresh,300); }
function toggleMasterMute(){ patch('/api/zones', {mute: !(ST && ST.master_mute)}).then(()=>setTimeout(refresh,250)); }
function mv(v){ dragging = true; }
function mvCommit(v){ dragging = false; patch('/api/zones', {vol: +v}).then(()=>setTimeout(refresh,250)); }
function zPower(id,on){ patch('/api/zones/'+id, {power:on}).then(()=>setTimeout(refresh,250)); }
function zMute(id,on){ patch('/api/zones/'+id, {mute:on}).then(()=>setTimeout(refresh,250)); }
function zVol(id,v){ patch('/api/zones/'+id, {vol:+v}); }

function renderStations(list, cur){
  const sel = document.getElementById('stations');
  if (sel.dataset.n != list.length){ sel.dataset.n = list.length;
    sel.innerHTML = list.map(n=>`<option>${n}</option>`).join(''); }
  if (cur) sel.value = cur;
}
function renderZones(zones){
  const el = document.getElementById('zones');
  el.innerHTML = zones.map(z=>{
    const silent = z.mute || !z.power;
    return `<div class="zone">
      <div class="zname" style="opacity:${silent?.5:1}">${z.name}</div>
      <div class="zctl">
        <span class="pill ${z.power?'on':''}" onclick="zPower(${z.id},${!z.power})">${z.power?'Aan':'Uit'}</span>
        <span class="pill ${z.mute?'muted':''}" onclick="zMute(${z.id},${!z.mute})">${z.mute?'Gedempt':'Dempen'}</span>
      </div>
      <input class="zvol" type="range" min="0" max="100" value="${z.vol}"
             oninput="zVol(${z.id},this.value)">
    </div>`; }).join('');
}
function renderGroups(groups){
  const card = document.getElementById('groupscard');
  if (!groups || !groups.length){ card.style.display='none'; return; }
  card.style.display='block';
  document.getElementById('groups').innerHTML = groups.map((g,i)=>{
    const silent = g.mute || !g.power;
    return `<div class="zone">
      <div class="zname" style="opacity:${silent?.5:1}">${esc(g.name)}</div>
      <div class="zctl">
        <span class="pill ${g.power?'on':''}" onclick="gset(${i},{power:${!g.power}})">${g.power?'Aan':'Uit'}</span>
        <span class="pill ${g.mute?'muted':''}" onclick="gset(${i},{mute:${!g.mute}})">${g.mute?'Gedempt':'Dempen'}</span>
      </div>
      <input class="zvol" type="range" min="0" max="100" value="${g.vol}" oninput="gvol(${i},this.value)">
    </div>`; }).join('');
}
function gset(i, body){ const g=ST&&ST.groups[i]; if(g) patch('/api/groups/'+encodeURIComponent(g.name), body).then(()=>setTimeout(refresh,250)); }
function gvol(i, v){ const g=ST&&ST.groups[i]; if(g) patch('/api/groups/'+encodeURIComponent(g.name), {vol:+v}); }
function apply(d){
  ST = d;
  const r = d.radio || {};
  document.getElementById('station').textContent = r.station || '— geen zender —';
  document.getElementById('title').textContent = r.title || '';
  document.getElementById('dot').className = 'dot' + (r.playing?' on':'');
  document.getElementById('playbtn').textContent = r.playing ? '⏹' : '▶︎';
  renderStations(r.stations || [], r.station);
  if (!dragging) document.getElementById('mvol').value = d.master_vol;
  document.getElementById('mmute').className = 'pill' + (d.master_mute?' muted':'');
  renderZones(d.zones || []);
  renderGroups(d.groups || []);
  const h = d.health || {ok:true};
  const he = document.getElementById('health');
  he.textContent = h.ok ? 'ok' : (h.issues||[]).join('; ') || 'probleem';
  he.className = h.ok ? 'ok' : 'bad';
  const art = document.getElementById('art');
  if (r.playing) art.src = '/api/cover?t=' + Math.floor(Date.now()/15000); else art.removeAttribute('src');
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'});
}
async function refresh(){ const d = await get('/api/status'); if (d) apply(d); }
refresh(); setInterval(refresh, 2000);
</script>
</body>
</html>
